name: Create Release and Package
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.0)'
        required: true
        default: 'v0.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building release for $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Package Extension
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cd apps/extension
          zip -r "neuro-nav-extension-${TAG}.zip" dist/ public/ package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Neuro-Nav ${{ steps.version.outputs.tag }}
          files: apps/extension/neuro-nav-extension-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
